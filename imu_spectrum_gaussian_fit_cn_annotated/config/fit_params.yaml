# IMU 频谱高斯拟合参数
# 列索引采用 0-based：CSV 第一列为 0。

# IMU 采样频率，单位 Hz。你的实验默认是 200 Hz。
sample_rate_hz: 200.0

# CSV 是否包含表头。
has_header: true

# 第 1~3 列为陀螺仪测量，因此默认列索引为 [0, 1, 2]
gyro_cols: [0, 1, 2]

# 第 4~6 列为加速度计测量，因此默认列索引为 [3, 4, 5]
acc_cols: [3, 4, 5]

# FFT 前是否去均值，用于抑制直流分量。
remove_mean: true

# FFT 前是否使用 Hann 窗，用于降低频谱泄漏。
use_hann_window: true

# 需要拟合的谱峰数量。对应四个电机，默认设置为 4。
num_peaks: 4

# 谱峰搜索频率范围，单位 Hz。
# 采样率 200 Hz 时 Nyquist 频率为 100 Hz，因此 max_freq_hz 不应超过 100。
min_freq_hz: 2.0
max_freq_hz: 100.0

# 相邻候选谱峰最小间隔，单位 Hz。
# 太小容易把同一个峰附近的局部扰动识别成多个峰。
min_peak_distance_hz: 3.0

# 每个谱峰局部高斯拟合半窗口，单位 Hz。
# 例如 5 表示初始候选区间约为 [peak-5, peak+5]。
fit_half_window_hz: 5.0

# 论文公式中的 beta：fL = mu - beta*sigma, fR = mu + beta*sigma。
# beta=2 约对应高斯假设下 95% 频率区间。
beta: 2.0

# 峰值最小相对高度。
# 例如 0.05 表示低于全局最大峰 5% 的局部峰不参与候选。
min_relative_peak_height: 0.05

# Ceres 非线性最小二乘最大迭代次数。
max_solver_iterations: 80
