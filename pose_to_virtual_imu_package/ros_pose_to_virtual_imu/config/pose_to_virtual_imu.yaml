# =============================================================================
# ROS 位姿反解虚拟 IMU 参数文件（详细注释版）
# =============================================================================
# 本节点从 /odom 或 /pose 中读取位置和姿态，通过滑窗局部多项式拟合反解：
#   angular_velocity      -> virtual gyro, rad/s
#   linear_acceleration   -> virtual accelerometer specific force, m/s^2
#
# 注意：输入四元数默认表示 body -> world。
# 如果你的位姿是 LiDAR/camera frame，需要先外参转换到 body/IMU frame。
# =============================================================================

# 输入位姿消息类型：
#   "odom"         : nav_msgs/Odometry
#   "pose_stamped" : geometry_msgs/PoseStamped
pose_type: "odom"

# 输入位姿话题。根据你的系统修改，例如：
#   /odom
#   /lio_sam/mapping/odometry
#   /aft_mapped_to_init
#   /vins_estimator/odometry
pose_topic: "/odom"

# 输出虚拟 IMU 话题，消息类型为 sensor_msgs/Imu。
output_imu_topic: "/virtual_imu_from_pose"

# 是否保存 CSV。建议调试阶段打开，正式在线运行时可关闭。
save_csv: true

# CSV 输出路径。ROS 会自动展开 $(env HOME)。
# 如果目录不存在，节点会尝试 mkdir -p 父目录。
output_csv_path: "$(env HOME)/catkin_ws/output/virtual_imu_from_pose.csv"

# =============================================================================
# 滑窗局部多项式参数
# =============================================================================

# 滑窗长度，必须为奇数。程序会自动把偶数加 1。
# 调参建议：
#   11~15 : 响应快，适合动态轨迹，但导数更抖；
#   21    : 折中，推荐初始值；
#   31~41 : 更平滑，适合悬停/稳态，但延迟更大。
# 输出时间戳为窗口中心，因此延迟约为 (window_size-1)/2 个 pose 采样周期。
window_size: 21

# 多项式阶数。
#   2 : 更稳健，适合位姿噪声大、悬停、低速场景；
#   3 : 更灵活，适合加减速、转弯、轨迹跟踪。
# 因为需要位置二阶导，所以不能低于 2。
poly_order: 3

# 重力加速度。ROS ENU/z-up 下，程序内部使用：
#   g_w = [0, 0, -gravity]
# 静止且机体姿态与世界系对齐时，输出 acc_z 约为 +9.80665。
gravity: 9.80665

# =============================================================================
# 导数后低通参数
# =============================================================================

# 一阶低通时间常数，单位 s。设为 0 表示关闭。
# 低通公式：y = y_prev + alpha * (x - y_prev), alpha = dt/(tau+dt)。
# 调参建议：
#   gyro_lowpass_tau = 0.01~0.02 : 响应快；
#   gyro_lowpass_tau = 0.03~0.05 : 更平滑。
gyro_lowpass_tau: 0.03

# 加速度来自位置二阶导，通常比角速度更容易波动，tau 可略大。
# 调参建议：
#   acc_lowpass_tau = 0.02~0.04 : 动态轨迹；
#   acc_lowpass_tau = 0.05~0.08 : 悬停/稳态/位姿噪声大。
acc_lowpass_tau: 0.03

# =============================================================================
# 异常值限幅
# =============================================================================

# 是否启用限幅。用于防止 pose 偶发跳变产生极大的虚拟 IMU 尖峰。
# 若要分析极端机动，可关闭；若用于 residual 频谱估计，建议开启。
enable_clipping: true

# 角速度限幅，单位 rad/s。
max_gyro_rad_s: 20.0

# 加速度计比力限幅，单位 m/s^2。
max_acc_m_s2: 80.0

# =============================================================================
# 时间戳和输出设置
# =============================================================================

# 若相邻 pose 时间间隔超过该阈值，认为发生断帧或回放中断，清空窗口。
# 例如 pose 频率为 50 Hz，正常 dt=0.02 s，则 0.2 s 已经是明显断帧。
max_pose_gap: 0.2

# 是否在输出 sensor_msgs/Imu 中填充 orientation。
# true  : orientation 等于窗口中心 pose 姿态；
# false : orientation_covariance[0] = -1，下游可视为无姿态。
publish_orientation: true

# 协方差占位值。这里只是填充到 sensor_msgs/Imu，不参与节点内部估计。
gyro_covariance: 1.0e-4
acc_covariance: 1.0e-2
