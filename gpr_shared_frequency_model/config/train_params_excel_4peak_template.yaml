# 4 主频版本模板。
# 若后续 FFT+高斯拟合每行最多输出 4 个主频和 4 个方差，按你的实际 Excel 列号修改。
# 下面给出一种常见布局示例：
# C-F: 电机1-4；H-K: gyro 方差1-4；M-P: gyro 主频1-4；
# R-U: acc 方差1-4；W-Z: acc 主频1-4。

csv_has_header: true
max_iterations: 8
optimize_hyperparams: true
variance_mode: variance
min_observation_variance: 1.0e-6

motor_speed_cols: [2, 3, 4, 5]

gyro:
  variance_cols:  [7, 8, 9, 10]
  frequency_cols: [12, 13, 14, 15]

acc:
  variance_cols:  [17, 18, 19, 20]
  frequency_cols: [22, 23, 24, 25]
